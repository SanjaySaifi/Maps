<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script> 
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>

html,body{

margin:0;

width:100%;

height:100%;

overflow:hidden;

}


#panel{

position:absolute;

top:10px;

left:10px;

z-index:999;

background:white;

padding:10px;

border-radius:10px;

font-family:Arial;

font-size:14px;

}


#buttons{

position:absolute;

bottom:20px;

width:100%;

display:flex;

justify-content:center;

gap:15px;

z-index:999;

}


button{

padding:12px 20px;

font-size:16px;

border:none;

border-radius:10px;

cursor:pointer;

}


#allBtn{

background:#FFD700;

}


#nearBtn{

background:#FF8C00;

}

</style>

</head>



<body>



<div id="panel">

Device GPS

<div id="gps">

Waiting...

</div>

<hr>

Width :

<span id="w">

0.8

</span>


<button onclick="W+=0.02;updateRect()">

+

</button>


<button onclick="W-=0.02;updateRect()">

-

</button>


<br><br>


Height :

<span id="h">

1.1

</span>


<button onclick="H+=0.02;updateRect()">

+

</button>


<button onclick="H-=0.02;updateRect()">

-

</button>

</div>



<div id="nearestInfo"

style="
position:absolute;

bottom:90px;

left:50%;

transform:translateX(-50%);

z-index:999;

background:rgba(255,255,255,0.9);

padding:10px 20px;

border-radius:10px;

font-family:Arial;

font-size:16px;

text-align:center;

display:none;
">

<b>

Nearest Shelter

<br>

最寄り避難所

</b>

<br><br>

Distance

<br>

距離 : --

</div>

<div id="buttons">

<button id="allBtn">

All Shelters<br>
避難所一覧

</button>


<button id="nearBtn">

Nearest Shelter<br>
最寄り避難所

</button>

</div>






<a-scene
mindar-image="
imageTargetSrc: ./marker.mind;
maxTrack:1;
filterMinCF:0.0001;
filterBeta:0.001;
missTolerance:15;
warmupTolerance:10;
"

vr-mode-ui="enabled:false"

device-orientation-permission-ui="enabled:false"

>


<a-camera

position="0 0 0"

look-controls="enabled:false">

</a-camera>




<a-entity

id="target"

mindar-image-target="targetIndex:0">


<!-- calibration rectangle -->

<a-plane

id="rect"

position="0 0 -0.001"

width="0.8"

height="1.1"

material="

color:green;

opacity:0.2;

transparent:true;

">

</a-plane>




<!-- USER -->


<a-sphere

id="user"

position="0 0 0"

radius="0.03"

color="green">

</a-sphere>



<a-text

id="you"

value="You are here\n現在地"

color="black"

align="center"

width="1"

position="0 0.08 0">

</a-text>



</a-entity>



</a-scene>





<script>


////////////////////////////////////////////////

// CALIBRATION

////////////////////////////////////////////////


let W=1.0;

let H=0.67;


const rect=document.querySelector("#rect");


function updateRect(){


rect.setAttribute("width",W);

rect.setAttribute("height",H);


document.getElementById("w")

.innerHTML=W.toFixed(3);


document.getElementById("h")

.innerHTML=H.toFixed(3);


updateShelters();


}



////////////////////////////////////////////////

// READ CORNER CSV

////////////////////////////////////////////////



let latTop;

let latBottom;

let lonLeft;

let lonRight;



fetch("./corner.csv")

.then(r=>r.text())

.then(text=>{


const rows=text.trim().split("\n");


for(let i=1;i<rows.length;i++){


const c=rows[i].split(",");


const pos=c[0]

.trim()

.toLowerCase();


const lat=parseFloat(c[1]);

const lon=parseFloat(c[2]);


if(pos==="top left"){

latTop=lat;

lonLeft=lon;

}


if(pos==="top right"){

lonRight=lon;

}


if(pos==="bottom left"){

latBottom=lat;

}


}


});




////////////////////////////////////////////////

// READ SHELTER CSV

////////////////////////////////////////////////


let shelters=[];



fetch("./shelter.csv")

.then(r=>r.text())

.then(text=>{


const rows=text.trim().split("\n");


for(let i=1;i<rows.length;i++){


const c=rows[i].split(",");


shelters.push({


id:c[0],


lat:parseFloat(c[1]),


lon:parseFloat(c[2]),


entity:null


});


}


console.log(

"Shelters loaded:",

shelters.length

);


});





////////////////////////////////////////////////

// USER

////////////////////////////////////////////////


const user=document.querySelector("#user");

const you=document.querySelector("#you");



let userLat;

let userLon;



navigator.geolocation.watchPosition(


function(pos){


if(latTop===undefined)return;


userLat=pos.coords.latitude;

userLon=pos.coords.longitude;



document.getElementById("gps")

.innerHTML=


userLat.toFixed(6)

+

"<br>"

+

userLon.toFixed(6);



moveUser();



if(showAll)

updateShelters();



if(showNearest)

showNearestShelter();



},


function(err){

console.log(err);

},


{

enableHighAccuracy:true

}


);





////////////////////////////////////////////////

// GPS TO MAP

////////////////////////////////////////////////


function gpsToMap(lat,lon){



let u=(lon-lonLeft)

/

(lonRight-lonLeft);



let v=(latTop-lat)

/

(latTop-latBottom);



u=Math.max(

0,

Math.min(1,u)

);



v=Math.max(

0,

Math.min(1,v)

);



let x=(u-0.5)*W;


let y=(0.5-v)*H;



return {x,y};


}



////////////////////////////////////////////////

// MOVE USER

////////////////////////////////////////////////



function moveUser(){


let p=gpsToMap(

userLat,

userLon

);



user.setAttribute(

"position",

`${p.x} ${p.y} 0`

);



you.setAttribute(

"position",

`${p.x} ${p.y+0.08} 0`

);


}




////////////////////////////////////////////////

// DISTANCE

////////////////////////////////////////////////



function dist(lat1,lon1,lat2,lon2){



const R=6371000;



let dLat=

(lat2-lat1)

*Math.PI/180;



let dLon=

(lon2-lon1)

*Math.PI/180;



let a=

Math.sin(dLat/2)

*Math.sin(dLat/2)

+

Math.cos(lat1*Math.PI/180)

*

Math.cos(lat2*Math.PI/180)

*

Math.sin(dLon/2)

*

Math.sin(dLon/2);



let c=

2*Math.atan2(

Math.sqrt(a),

Math.sqrt(1-a)

);



return R*c;


}




////////////////////////////////////////////////

// ALL SHELTERS

////////////////////////////////////////////////



let showAll=false;



document

.getElementById("allBtn")

.onclick=function(){



showAll=!showAll;



updateShelters();


}




function updateShelters(){



const target=

document.querySelector("#target");



for(let s of shelters){



if(s.entity){

target.removeChild(

s.entity

);

s.entity=null;

}



if(!showAll)

continue;



let p=

gpsToMap(

s.lat,

s.lon

);



let dot=

document.createElement(

"a-sphere"

);



dot.setAttribute(

"position",

`${p.x} ${p.y} 0`

);



dot.setAttribute(

"radius",

"0.02"

);



dot.setAttribute(

"color",

"yellow"

);



target.appendChild(

dot

);



s.entity=dot;


}


}




////////////////////////////////////////////////

// NEAREST SHELTER

////////////////////////////////////////////////



let showNearest=false;

let nearestDot=null;



document

.getElementById("nearBtn")

.onclick=function(){


showNearest=!showNearest;



if(!showNearest){

document

.getElementById(

"nearestInfo"

)

.style.display="none";

}



showNearestShelter();


}



function showNearestShelter(){



const target=

document.querySelector("#target");



if(nearestDot){

target.removeChild(

nearestDot

);

nearestDot=null;

}



if(!showNearest)

return;



let best=1e20;

let bestShelter=null;



for(let s of shelters){


let d=

dist(

userLat,

userLon,

s.lat,

s.lon

);



if(d<best){


best=d;

bestShelter=s;


}


}



if(bestShelter==null)

return;

document

.getElementById(

"nearestInfo"

)

.style.display="block";



document

.getElementById(

"nearestInfo"

)

.innerHTML=


"<b>"

+

"Nearest Shelter"

+

"<br>"

+

"最寄り避難所"

+

"</b>"

+

"<br><br>"

+

"Distance"

+

"<br>"

+

"距離 : "

+

best.toFixed(0)

+

" m";


let p=

gpsToMap(

bestShelter.lat,

bestShelter.lon

);



nearestDot=

document.createElement(

"a-sphere"

);



nearestDot.setAttribute(

"position",

`${p.x} ${p.y} 0`

);



nearestDot.setAttribute(

"radius",

"0.03"

);



nearestDot.setAttribute(

"color",

"orange"

);



target.appendChild(

nearestDot

);


}



</script>



</body>

</html>
